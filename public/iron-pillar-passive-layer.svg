<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Delhi Iron Pillar passive layer</title>
  <desc id="desc">Cross-section style diagram explaining forge welding, slag inclusions, and the protective passive layer of the Delhi Iron Pillar.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0e3c8"/>
      <stop offset="100%" stop-color="#d7b28b"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <text x="84" y="104" fill="#3f281d" font-size="46" font-family="Georgia, serif">Delhi Iron Pillar: Why the Surface Holds</text>
  <text x="84" y="146" fill="#6b4b35" font-size="22" font-family="Arial, sans-serif">Forge-welded wrought iron, phosphorus-rich chemistry, and a stable passive film work together.</text>

  <rect x="90" y="206" width="400" height="560" rx="28" fill="#f8f2e8" stroke="#8f603c" stroke-width="4"/>
  <text x="128" y="270" fill="#6b3f27" font-size="32" font-family="Arial, sans-serif">Monument Build</text>
  <rect x="236" y="330" width="112" height="312" rx="46" fill="#454545"/>
  <rect x="220" y="642" width="144" height="34" rx="12" fill="#74533b"/>
  <path d="M248 364 L336 364" stroke="#a17a53" stroke-width="6"/>
  <path d="M244 456 L340 456" stroke="#a17a53" stroke-width="6"/>
  <path d="M252 548 L332 548" stroke="#a17a53" stroke-width="6"/>
  <text x="126" y="696" fill="#3d2b1f" font-size="19" font-family="Arial, sans-serif">
    <tspan x="126" dy="0">The shaft was built by repeatedly</tspan>
    <tspan x="126" dy="26">forge-welding large blooms into</tspan>
    <tspan x="126" dy="26">one monumental iron column.</tspan>
  </text>

  <rect x="548" y="206" width="344" height="560" rx="28" fill="#f8f2e8" stroke="#8f603c" stroke-width="4"/>
  <text x="586" y="270" fill="#6b3f27" font-size="32" font-family="Arial, sans-serif">Cross Section</text>
  <circle cx="694" cy="472" r="148" fill="#5d5d5d"/>
  <circle cx="694" cy="472" r="118" fill="#787878"/>
  <circle cx="694" cy="472" r="92" fill="#a86d35"/>
  <circle cx="694" cy="472" r="74" fill="#9f9f9f"/>
  <circle cx="636" cy="430" r="12" fill="#3a2518"/>
  <circle cx="752" cy="490" r="12" fill="#3a2518"/>
  <circle cx="676" cy="548" r="10" fill="#3a2518"/>
  <rect x="774" y="338" width="84" height="180" rx="18" fill="#ece0c9"/>
  <text x="792" y="378" fill="#3d2b1f" font-size="17" font-family="Arial, sans-serif">
    <tspan x="792" dy="0">Outer film:</tspan>
    <tspan x="792" dy="24">passive</tspan>
    <tspan x="792" dy="24">oxide</tspan>
    <tspan x="792" dy="42">Core:</tspan>
    <tspan x="792" dy="24">wrought</tspan>
    <tspan x="792" dy="24">iron body</tspan>
  </text>
  <text x="586" y="680" fill="#3d2b1f" font-size="18" font-family="Arial, sans-serif">
    <tspan x="586" dy="0">Slag inclusions and phosphorus</tspan>
    <tspan x="586" dy="25">helped the surface develop</tspan>
    <tspan x="586" dy="25">a stable protective film.</tspan>
  </text>

  <rect x="950" y="206" width="360" height="560" rx="28" fill="#f8f2e8" stroke="#8f603c" stroke-width="4"/>
  <text x="988" y="270" fill="#6b3f27" font-size="32" font-family="Arial, sans-serif">Stability Factors</text>
  <rect x="990" y="326" width="280" height="110" rx="18" fill="#ece0c9"/>
  <text x="1012" y="370" fill="#3d2b1f" font-size="19" font-family="Arial, sans-serif">
    <tspan x="1012" dy="0">High phosphorus</tspan>
    <tspan x="1012" dy="26">encouraged a dense,</tspan>
    <tspan x="1012" dy="26">adherent surface film.</tspan>
  </text>
  <rect x="990" y="468" width="280" height="110" rx="18" fill="#ece0c9"/>
  <text x="1012" y="512" fill="#3d2b1f" font-size="19" font-family="Arial, sans-serif">
    <tspan x="1012" dy="0">Forge quality and</tspan>
    <tspan x="1012" dy="26">slag distribution changed</tspan>
    <tspan x="1012" dy="26">corrosion behavior.</tspan>
  </text>
  <rect x="990" y="610" width="280" height="110" rx="18" fill="#ece0c9"/>
  <text x="1012" y="654" fill="#3d2b1f" font-size="19" font-family="Arial, sans-serif">
    <tspan x="1012" dy="0">Wet-dry cycling helped</tspan>
    <tspan x="1012" dy="26">the protective layer</tspan>
    <tspan x="1012" dy="26">mature over time.</tspan>
  </text>
</svg>
