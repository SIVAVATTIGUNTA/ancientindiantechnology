<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="900" fill="#F6E8D1"/>
  <rect x="48" y="48" width="1304" height="804" rx="34" fill="#FFF8EE" stroke="#C89B61" stroke-width="4"/>
  <text x="92" y="138" fill="#2B1B17" font-family="Georgia, serif" font-size="56">Sun Temple Alignment</text>
  <text x="92" y="188" fill="#7A4A32" font-family="Arial, sans-serif" font-size="24">These monuments are strongest as solar architecture: orientation, light, and symbolic time.</text>

  <line x1="210" y1="450" x2="872" y2="450" stroke="#C89B61" stroke-width="8" stroke-linecap="round"/>
  <path d="M210 450H872" stroke="#2B1B17" stroke-width="2" stroke-dasharray="10 10"/>
  <text x="176" y="432" fill="#7A4A32" font-family="Arial, sans-serif" font-size="22">East</text>
  <text x="842" y="432" fill="#7A4A32" font-family="Arial, sans-serif" font-size="22">West</text>

  <circle cx="220" cy="300" r="54" fill="#F4C75E"/>
  <path d="M250 330L520 448" stroke="#F4C75E" stroke-width="10" stroke-linecap="round"/>
  <path d="M250 270L520 448" stroke="#F4C75E" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <text x="158" y="382" fill="#7A4A32" font-family="Arial, sans-serif" font-size="22">Sunrise axis</text>

  <rect x="520" y="320" width="298" height="260" rx="24" fill="#B78852"/>
  <rect x="570" y="264" width="198" height="90" rx="18" fill="#D9B46F"/>
  <rect x="610" y="214" width="118" height="60" rx="16" fill="#E8C98B"/>
  <text x="568" y="624" fill="#2B1B17" font-family="Arial, sans-serif" font-size="28" font-weight="700">Temple axis</text>
  <text x="568" y="660" fill="#7A4A32" font-family="Arial, sans-serif" font-size="22">Orientation and procession guide the</text>
  <text x="568" y="692" fill="#7A4A32" font-family="Arial, sans-serif" font-size="22">experience of sunlight into sacred space.</text>

  <rect x="914" y="246" width="346" height="388" rx="28" fill="#2B1B17"/>
  <text x="950" y="310" fill="#F6E8D1" font-family="Arial, sans-serif" font-size="26" font-weight="700">How to read the site</text>
  <text x="950" y="368" fill="#D9B46F" font-family="Arial, sans-serif" font-size="20">1. Check the east-facing axis.</text>
  <text x="950" y="408" fill="#D9B46F" font-family="Arial, sans-serif" font-size="20">2. Look for controlled</text>
  <text x="974" y="436" fill="#D9B46F" font-family="Arial, sans-serif" font-size="20">light entry.</text>
  <text x="950" y="478" fill="#D9B46F" font-family="Arial, sans-serif" font-size="20">3. Read time symbols:</text>
  <text x="974" y="506" fill="#D9B46F" font-family="Arial, sans-serif" font-size="20">wheels, horses, icons.</text>
  <text x="950" y="560" fill="#F6E8D1" font-family="Arial, sans-serif" font-size="20">Not a Jantar Mantar-style</text>
  <text x="950" y="588" fill="#F6E8D1" font-family="Arial, sans-serif" font-size="20">precision observatory.</text>

  <rect x="110" y="724" width="1180" height="84" rx="20" fill="#F3E4C4" stroke="#C89B61" stroke-width="3"/>
  <text x="148" y="762" fill="#7A4A32" font-family="Arial, sans-serif" font-size="23">Best teaching claim: solar temples preserve directional planning and ritualized light.</text>
  <text x="148" y="792" fill="#7A4A32" font-family="Arial, sans-serif" font-size="23">They do not need exaggerated scientific claims to remain impressive.</text>
</svg>
