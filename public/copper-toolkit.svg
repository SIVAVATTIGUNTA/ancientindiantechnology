<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Copper artifact toolkit</title>
  <desc id="desc">Illustrated lineup of copper tool and vessel types used to show the diversity of copper metallurgy outputs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a1c18"/>
      <stop offset="100%" stop-color="#8c5b35"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <text x="84" y="102" fill="#f7efdf" font-size="46" font-family="Georgia, serif">Copper Outputs in Early Workshops</text>
  <text x="84" y="144" fill="#e3c9a5" font-size="22" font-family="Arial, sans-serif">Different forms required different choices in casting, hammering, and finishing.</text>

  <rect x="84" y="210" width="1232" height="580" rx="30" fill="#f8f1e3" fill-opacity="0.96"/>
  <g transform="translate(130 270)">
    <rect x="0" y="0" width="250" height="430" rx="24" fill="#efe2ca"/>
    <text x="44" y="54" fill="#6b3f27" font-size="30" font-family="Arial, sans-serif">Blade or Axe</text>
    <path d="M102 248 L182 114 L210 144 L138 290 Z" fill="#c67d37"/>
    <rect x="74" y="274" width="28" height="92" rx="10" fill="#72513c"/>
    <text x="34" y="382" fill="#3d2b1f" font-size="19" font-family="Arial, sans-serif">
      <tspan x="34" dy="0">Cast rough, then</tspan>
      <tspan x="34" dy="26">hammer-finished.</tspan>
    </text>
  </g>
  <g transform="translate(430 270)">
    <rect x="0" y="0" width="250" height="430" rx="24" fill="#efe2ca"/>
    <text x="52" y="54" fill="#6b3f27" font-size="30" font-family="Arial, sans-serif">Bowl or Vessel</text>
    <path d="M64 172 C82 280, 122 322, 160 322 C198 322, 236 280, 146 172 Z" fill="#c67d37"/>
    <text x="34" y="366" fill="#3d2b1f" font-size="19" font-family="Arial, sans-serif">
      <tspan x="34" dy="0">Thin walls demanded</tspan>
      <tspan x="34" dy="26">heat control and</tspan>
      <tspan x="34" dy="26">planishing.</tspan>
    </text>
  </g>
  <g transform="translate(730 270)">
    <rect x="0" y="0" width="250" height="430" rx="24" fill="#efe2ca"/>
    <text x="60" y="54" fill="#6b3f27" font-size="30" font-family="Arial, sans-serif">Rod or Pin</text>
    <rect x="114" y="124" width="24" height="212" rx="12" fill="#c67d37"/>
    <circle cx="126" cy="112" r="18" fill="#c67d37"/>
    <text x="34" y="366" fill="#3d2b1f" font-size="19" font-family="Arial, sans-serif">
      <tspan x="34" dy="0">Simple forms still required</tspan>
      <tspan x="34" dy="26">consistent metal</tspan>
      <tspan x="34" dy="26">quality.</tspan>
    </text>
  </g>
  <g transform="translate(1030 270)">
    <rect x="0" y="0" width="220" height="430" rx="24" fill="#efe2ca"/>
    <text x="42" y="54" fill="#6b3f27" font-size="30" font-family="Arial, sans-serif">Ornament</text>
    <circle cx="110" cy="206" r="66" fill="none" stroke="#c67d37" stroke-width="18"/>
    <text x="28" y="382" fill="#3d2b1f" font-size="19" font-family="Arial, sans-serif">
      <tspan x="28" dy="0">Small pieces reveal</tspan>
      <tspan x="28" dy="26">control over finish.</tspan>
    </text>
  </g>
</svg>
