<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="900" fill="#F6ECD9"/>
  <rect x="48" y="48" width="1304" height="804" rx="34" fill="#FFF8EE" stroke="#C69A61" stroke-width="4"/>
  <text x="92" y="138" fill="#2B1B17" font-family="Georgia, serif" font-size="56">Jantar Mantar Instrument Guide</text>
  <text x="92" y="188" fill="#7A4A32" font-family="Arial, sans-serif" font-size="24">Jaipur's masonry observatory turns geometry into a readable scientific interface.</text>

  <rect x="96" y="252" width="380" height="536" rx="28" fill="#F3E4C4" stroke="#C69A61" stroke-width="3"/>
  <rect x="510" y="252" width="380" height="536" rx="28" fill="#F3E4C4" stroke="#C69A61" stroke-width="3"/>
  <rect x="924" y="252" width="380" height="536" rx="28" fill="#F3E4C4" stroke="#C69A61" stroke-width="3"/>

  <text x="132" y="310" fill="#2B1B17" font-family="Arial, sans-serif" font-size="30" font-weight="700">Samrat Yantra</text>
  <text x="546" y="310" fill="#2B1B17" font-family="Arial, sans-serif" font-size="30" font-weight="700">Jai Prakash</text>
  <text x="960" y="310" fill="#2B1B17" font-family="Arial, sans-serif" font-size="30" font-weight="700">Ram Yantra</text>

  <path d="M180 640L286 390L392 640H180Z" fill="#B78852"/>
  <line x1="286" y1="390" x2="286" y2="650" stroke="#FFF8EE" stroke-width="6"/>
  <path d="M158 644H416" stroke="#7A4A32" stroke-width="8"/>
  <text x="132" y="690" fill="#7A4A32" font-family="Arial, sans-serif" font-size="20">Reads solar time and</text>
  <text x="132" y="718" fill="#7A4A32" font-family="Arial, sans-serif" font-size="20">helps estimate declination</text>
  <text x="132" y="746" fill="#7A4A32" font-family="Arial, sans-serif" font-size="20">from the moving shadow.</text>

  <circle cx="700" cy="540" r="124" stroke="#B78852" stroke-width="10"/>
  <path d="M576 540H824" stroke="#B78852" stroke-width="8"/>
  <path d="M700 416V664" stroke="#B78852" stroke-width="8"/>
  <circle cx="700" cy="540" r="18" fill="#7A4A32"/>
  <text x="546" y="690" fill="#7A4A32" font-family="Arial, sans-serif" font-size="20">Projects celestial coordinates</text>
  <text x="546" y="718" fill="#7A4A32" font-family="Arial, sans-serif" font-size="20">into a bowl-like surface</text>
  <text x="546" y="746" fill="#7A4A32" font-family="Arial, sans-serif" font-size="20">that observers can read.</text>

  <circle cx="1114" cy="536" r="124" stroke="#B78852" stroke-width="10"/>
  <line x1="1114" y1="412" x2="1114" y2="660" stroke="#B78852" stroke-width="8"/>
  <line x1="990" y1="536" x2="1238" y2="536" stroke="#B78852" stroke-width="8"/>
  <circle cx="1114" cy="536" r="16" fill="#7A4A32"/>
  <text x="960" y="690" fill="#7A4A32" font-family="Arial, sans-serif" font-size="20">Measures altitude and</text>
  <text x="960" y="718" fill="#7A4A32" font-family="Arial, sans-serif" font-size="20">azimuth with cylindrical</text>
  <text x="960" y="746" fill="#7A4A32" font-family="Arial, sans-serif" font-size="20">walls and markings.</text>
</svg>
